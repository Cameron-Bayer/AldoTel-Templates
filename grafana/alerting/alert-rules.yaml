# ClickStack Grafana alerts — alert rules
# ============================================================================
# Six high-signal alert rules that query the SAME ClickHouse tables ClickStack
# writes (otel_traces / otel_logs / otel_metrics_gauge). They complement the
# HyperDX alerts pack (../../hyperdx/alerts) — covering a different signal set —
# and evaluate natively in Grafana so notifications, silences and on-call
# routing all live in one place.
#
# ----------------------------------------------------------------------------
# DATASOURCE UID  (important for portability)
# ----------------------------------------------------------------------------
# Every query below references  datasourceUid: clickstack-ch . When you add the
# ClickHouse datasource in YOUR Grafana, set its UID to  clickstack-ch
# (Connections > Data sources > ClickHouse > "UID" field), OR find/replace
# "clickstack-ch" in this file with your datasource's UID. The dev harness
# datasource (provisioning/datasources/clickhouse.yaml) already uses this UID.
#
# ----------------------------------------------------------------------------
# HOW EACH RULE IS BUILT (A / B / C pattern)
# ----------------------------------------------------------------------------
#   A = ClickHouse SQL query, returns one numeric "value" per series (per
#       service where relevant). The query window is set by relativeTimeRange.
#   B = Reduce (last)  -> collapses A to a single number per series.
#   C = Threshold      -> the firing condition (this is the rule's "condition").
# Tune a rule by editing the number in its C > conditions > evaluator > params.
#
# ----------------------------------------------------------------------------
# DATABASE NAME
# ----------------------------------------------------------------------------
# Queries use the  default  database (ClickStack's default). If your ClickStack
# writes to a different database, find/replace  default.  below.
apiVersion: 1

groups:
  # ==========================================================================
  # Services (application health, from otel_traces)
  # ==========================================================================
  - orgId: 1
    name: ClickStack Services
    folder: ClickStack Alerts
    interval: 1m
    rules:
      # --- 1. Service error rate high --------------------------------------
      - uid: clickstack-svc-error-rate
        title: Service error rate high
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          stack: clickstack
        annotations:
          summary: High error rate on {{ $labels.service }}
          description: >-
            {{ $labels.service }} server-span error rate is
            {{ printf "%.1f" $values.B.Value }}% over the last 10m
            (warns above 5%). Investigate in the Service Health dashboard.
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: clickstack-ch
            model:
              refId: A
              editorType: sql
              queryType: table
              format: 1
              intervalMs: 1000
              maxDataPoints: 43200
              rawSql: |
                SELECT ServiceName AS service,
                       100.0 * countIf(StatusCode = 'Error') / count() AS value
                FROM default.otel_traces
                WHERE $__timeFilter(Timestamp) AND SpanKind = 'Server'
                GROUP BY service
                HAVING count() >= 20
                ORDER BY value DESC
          - refId: B
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model: { refId: B, type: reduce, reducer: last, expression: A }
          - refId: C
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [5] }

      # --- 2. Service p95 latency high -------------------------------------
      - uid: clickstack-svc-latency-p95
        title: Service p95 latency high
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          stack: clickstack
        annotations:
          summary: High p95 latency on {{ $labels.service }}
          description: >-
            {{ $labels.service }} p95 server latency is
            {{ printf "%.0f" $values.B.Value }} ms over the last 10m
            (warns above 2000 ms).
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: clickstack-ch
            model:
              refId: A
              editorType: sql
              queryType: table
              format: 1
              intervalMs: 1000
              maxDataPoints: 43200
              rawSql: |
                SELECT ServiceName AS service,
                       quantile(0.95)(Duration) / 1e6 AS value
                FROM default.otel_traces
                WHERE $__timeFilter(Timestamp) AND SpanKind = 'Server'
                GROUP BY service
                HAVING count() >= 20
                ORDER BY value DESC
          - refId: B
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model: { refId: B, type: reduce, reducer: last, expression: A }
          - refId: C
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [2000] }

      # --- 3. Trace ingestion stalled --------------------------------------
      # Fires when no spans have been received for 10 minutes: the collector,
      # the app, or ClickHouse writes have stopped.
      - uid: clickstack-trace-ingestion-stalled
        title: Trace ingestion stalled
        condition: C
        for: 10m
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: critical
          stack: clickstack
        annotations:
          summary: No traces ingested for 10m
          description: >-
            Zero spans landed in otel_traces over the last 10m. Check the
            OpenTelemetry collector and the ClickHouse writer.
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: clickstack-ch
            model:
              refId: A
              editorType: sql
              queryType: table
              format: 1
              intervalMs: 1000
              maxDataPoints: 43200
              rawSql: |
                SELECT count() AS value
                FROM default.otel_traces
                WHERE $__timeFilter(Timestamp)
          - refId: B
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model: { refId: B, type: reduce, reducer: last, expression: A }
          - refId: C
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1] }

      # --- 3b. SLO fast burn (99.9% availability) --------------------------
      # Burn rate = error rate / (1 - SLO). At 14.4x the 0.1% budget is spent
      # in ~2 days; this is the classic multi-window fast-burn page.
      - uid: clickstack-slo-fast-burn
        title: SLO error budget fast burn
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          stack: clickstack
        annotations:
          summary: '{{ $labels.service }} is burning its error budget fast'
          description: >-
            {{ $labels.service }} burn rate is {{ printf "%.1f" $values.B.Value }}x
            the 99.9% SLO budget over the last 1h (pages above 14.4x). Investigate
            in the Service Health dashboard.
        data:
          - refId: A
            relativeTimeRange: { from: 3600, to: 0 }
            datasourceUid: clickstack-ch
            model:
              refId: A
              editorType: sql
              queryType: table
              format: 1
              intervalMs: 1000
              maxDataPoints: 43200
              rawSql: |
                SELECT ServiceName AS service,
                       (countIf(StatusCode = 'Error') / nullIf(count(), 0)) / 0.001 AS value
                FROM default.otel_traces
                WHERE $__timeFilter(Timestamp) AND SpanKind = 'Server'
                GROUP BY service
                HAVING count() >= 20
                ORDER BY value DESC
          - refId: B
            relativeTimeRange: { from: 3600, to: 0 }
            datasourceUid: __expr__
            model: { refId: B, type: reduce, reducer: last, expression: A }
          - refId: C
            relativeTimeRange: { from: 3600, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [14.4] }

  # ==========================================================================
  # Kubernetes (infrastructure, from otel_metrics_gauge)
  # ==========================================================================
  - orgId: 1
    name: ClickStack Kubernetes
    folder: ClickStack Alerts
    interval: 1m
    rules:
      # --- 4. Pods not Running ---------------------------------------------
      # k8s.pod.phase == 2 means Running, == 3 means Succeeded (completed Jobs).
      # Any pod whose latest phase is neither (Pending/Failed/Unknown) is counted.
      - uid: clickstack-pods-not-running
        title: Pods not Running
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          stack: clickstack
        annotations:
          summary: '{{ printf "%.0f" $values.B.Value }} pod(s) not in Running phase'
          description: >-
            One or more pods have been outside the Running phase for 5m
            (completed 'Succeeded' Job pods are excluded). Check the Kubernetes
            Cluster Overview dashboard.
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: clickstack-ch
            model:
              refId: A
              editorType: sql
              queryType: table
              format: 1
              intervalMs: 1000
              maxDataPoints: 43200
              rawSql: |
                SELECT count() AS value
                FROM (
                  SELECT ResourceAttributes['k8s.pod.uid'] AS uid,
                         argMax(Value, TimeUnix) AS phase
                  FROM default.otel_metrics_gauge
                  WHERE MetricName = 'k8s.pod.phase'
                    AND $__timeFilter(TimeUnix)
                  GROUP BY uid
                  HAVING phase NOT IN (2, 3)
                )
          - refId: B
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model: { refId: B, type: reduce, reducer: last, expression: A }
          - refId: C
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }

      # --- 4b. Container restarts in window --------------------------------
      # Counts restarts that occurred INSIDE the eval window (per-container
      # max-min of the cumulative restart counter), not the lifetime total.
      - uid: clickstack-container-restarts
        title: Container restarts detected
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          stack: clickstack
        annotations:
          summary: '{{ printf "%.0f" $values.B.Value }} container restart(s) in the last 15m'
          description: >-
            One or more containers restarted in the last 15m (possible crash
            loop). Check the Kubernetes Cluster Overview dashboard.
        data:
          - refId: A
            relativeTimeRange: { from: 900, to: 0 }
            datasourceUid: clickstack-ch
            model:
              refId: A
              editorType: sql
              queryType: table
              format: 1
              intervalMs: 1000
              maxDataPoints: 43200
              rawSql: |
                SELECT sum(d) AS value
                FROM (
                  SELECT concat(ResourceAttributes['k8s.pod.uid'], '/',
                                ResourceAttributes['k8s.container.name']) AS c,
                         max(Value) - min(Value) AS d
                  FROM default.otel_metrics_gauge
                  WHERE MetricName = 'k8s.container.restarts'
                    AND $__timeFilter(TimeUnix)
                  GROUP BY c
                )
          - refId: B
            relativeTimeRange: { from: 900, to: 0 }
            datasourceUid: __expr__
            model: { refId: B, type: reduce, reducer: last, expression: A }
          - refId: C
            relativeTimeRange: { from: 900, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }

  # ==========================================================================
  # Logs (from otel_logs)
  # ==========================================================================
  - orgId: 1
    name: ClickStack Logs
    folder: ClickStack Alerts
    interval: 1m
    rules:
      # --- 5. Error log rate high ------------------------------------------
      - uid: clickstack-error-log-rate
        title: Error log rate high
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          stack: clickstack
        annotations:
          summary: Elevated error/fatal log rate
          description: >-
            error+fatal logs are arriving at
            {{ printf "%.1f" $values.B.Value }} per second over the last 5m
            (warns above 5/s). Check the Logs & Errors dashboard.
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: clickstack-ch
            model:
              refId: A
              editorType: sql
              queryType: table
              format: 1
              intervalMs: 1000
              maxDataPoints: 43200
              rawSql: |
                SELECT countIf(SeverityNumber >= 17 OR lower(SeverityText) IN ('error', 'fatal'))
                       / greatest(dateDiff('second', $__fromTime, $__toTime), 1) AS value
                FROM default.otel_logs
                WHERE $__timeFilter(Timestamp)
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model: { refId: B, type: reduce, reducer: last, expression: A }
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [5] }

      # --- 6. Fatal logs present -------------------------------------------
      - uid: clickstack-fatal-logs
        title: Fatal logs present
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          stack: clickstack
        annotations:
          summary: Fatal logs detected
          description: >-
            {{ printf "%.0f" $values.B.Value }} fatal log line(s) in the last 5m.
            A fatal usually means a process crashed or is crash-looping.
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: clickstack-ch
            model:
              refId: A
              editorType: sql
              queryType: table
              format: 1
              intervalMs: 1000
              maxDataPoints: 43200
              rawSql: |
                SELECT countIf(SeverityNumber >= 21 OR lower(SeverityText) = 'fatal') AS value
                FROM default.otel_logs
                WHERE $__timeFilter(Timestamp)
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model: { refId: B, type: reduce, reducer: last, expression: A }
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }

  # ==========================================================================
  # ClickStack platform (the pipeline itself: OTel collector + ClickHouse)
  # Cumulative counters live in otel_metrics_sum and MUST be charted as
  # per-service.instance.id windowed deltas (max-min), never sum(Value).
  # ==========================================================================
  - orgId: 1
    name: ClickStack Platform
    folder: ClickStack Alerts
    interval: 1m
    rules:
      # --- 7. Collector dropping telemetry ---------------------------------
      # Any refused spans/logs/metric points over the last 10m means the
      # collector rejected data (backpressure, queue full, bad payloads).
      - uid: clickstack-collector-dropping
        title: Collector dropping telemetry
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          stack: clickstack
        annotations:
          summary: OTel collector refused {{ printf "%.0f" $values.B.Value }} item(s) in 10m
          description: >-
            The OpenTelemetry collector refused spans/logs/metric points over the
            last 10m — telemetry is being dropped. Check collector queue/backpressure
            and the Executive Summary "ClickStack platform" row.
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: clickstack-ch
            model:
              refId: A
              editorType: sql
              queryType: table
              format: 1
              intervalMs: 1000
              maxDataPoints: 43200
              rawSql: |
                SELECT sum(d) AS value
                FROM (
                  SELECT ResourceAttributes['service.instance.id'] AS i,
                         max(Value) - min(Value) AS d
                  FROM default.otel_metrics_sum
                  WHERE MetricName IN (
                          'otelcol_receiver_refused_spans_total',
                          'otelcol_receiver_refused_log_records_total',
                          'otelcol_receiver_refused_metric_points_total')
                    AND $__timeFilter(TimeUnix)
                  GROUP BY i, MetricName
                )
          - refId: B
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model: { refId: B, type: reduce, reducer: last, expression: A }
          - refId: C
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }

      # --- 8. ClickHouse failed queries elevated ---------------------------
      # Failed queries per second (windowed delta of the cumulative counter).
      - uid: clickstack-ch-failed-queries
        title: ClickHouse failed queries elevated
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          stack: clickstack
        annotations:
          summary: ClickHouse failing {{ printf "%.2f" $values.B.Value }} queries/sec
          description: >-
            ClickHouse is failing queries at {{ printf "%.2f" $values.B.Value }}/sec
            over the last 10m (warns above 1/sec). Check ClickHouse load/errors and
            the Executive Summary "ClickStack platform" row.
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: clickstack-ch
            model:
              refId: A
              editorType: sql
              queryType: table
              format: 1
              intervalMs: 1000
              maxDataPoints: 43200
              rawSql: |
                SELECT sum(d) / greatest(dateDiff('second', $__fromTime, $__toTime), 1) AS value
                FROM (
                  SELECT ResourceAttributes['service.instance.id'] AS i,
                         max(Value) - min(Value) AS d
                  FROM default.otel_metrics_sum
                  WHERE MetricName = 'ClickHouseProfileEvents_FailedQuery'
                    AND $__timeFilter(TimeUnix)
                  GROUP BY i
                )
          - refId: B
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model: { refId: B, type: reduce, reducer: last, expression: A }
          - refId: C
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [1] }
