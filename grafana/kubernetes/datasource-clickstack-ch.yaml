# Provisioned ClickHouse data source for a ClickStack-on-Kubernetes Grafana.
#
# This is the data source the alert rules in ../alerting/ reference by the fixed
# UID `clickstack-ch` (provisioned alert rules can't prompt for a data source).
# install-k8s.ps1 / install-k8s.sh load this file as an extra key in the Grafana
# datasources provisioning ConfigMap so it survives pod restarts.
#
# The password is read from the CH_PASSWORD environment variable that the
# ClickStack Grafana deployment already injects (the same one its built-in
# `clickhouse` data source uses) — no secret handling required.
#
# TLS: this defaults to the native-secure port (9440) with CA verification,
# matching a TLS-hardened ClickStack where plaintext 9000/8123 is disabled. The
# CA certificate is read from a file already mounted into the Grafana pod
# (`$__file{...}`), mirroring the chart's built-in `clickhouse` data source.
#   * Different CA path?  edit `tlsCACert` below (or pass -CaCertPath / --ca-cert-path).
#   * Plaintext ClickStack (no TLS)?  pass -Insecure / --insecure to the installer,
#     which flips `secure`/`tlsAuthWithCACert` to false, drops the CA cert, and
#     defaults the port to 9000.
#   * Different host/port?  edit `server`/`port` (or pass -ChServer/-ChPort,
#     --ch-server/--ch-port).
apiVersion: 1
datasources:
  - name: ClickStack ClickHouse
    uid: clickstack-ch
    type: grafana-clickhouse-datasource
    access: proxy
    isDefault: false
    jsonData:
      defaultDatabase: default
      port: 9440
      server: clickstack-clickhouse-clickhouse-headless
      username: app
      protocol: native
      secure: true
      tlsAuthWithCACert: true
    secureJsonData:
      password: $__env{CH_PASSWORD}
      tlsCACert: $__file{/etc/grafana/certs/ca.crt}
